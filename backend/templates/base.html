<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Recipe Recommender - Discover Delicious Meals</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet" />
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          rel="stylesheet" />
    <!-- Select2 for ingredient dropdown -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
          rel="stylesheet" />
    <!-- Custom CSS -->
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --dark-color: #2d3436;
            --light-color: #f9f9f9;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
        }
        
        .navbar-brand {
            font-weight: 700;
            color: var(--primary-color) !important;
        }
        
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 0;
            margin-bottom: 50px;
        }
        
        .recipe-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
            height: 100%;
        }
        
        .recipe-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .recipe-image {
            height: 200px;
            object-fit: cover;
            width: 100%;
        }
        
        .nutrition-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 20px;
            margin-right: 5px;
        }
        
        .badge-calories {
            background-color: #ff7675;
            color: white;
        }
        
        .badge-protein {
            background-color: #74b9ff;
            color: white;
        }
        
        .badge-carbs {
            background-color: #55efc4;
            color: #2d3436;
        }
        
        .similarity-score {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .ingredient-tag {
            background-color: #e9ecef;
            border-radius: 20px;
            padding: 5px 12px;
            margin: 3px;
            display: inline-block;
            font-size: 0.9rem;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .cooking-time {
            color: #636e72;
            font-size: 0.9rem;
        }
        
        .select2-container--default .select2-selection--multiple {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            min-height: 50px;
            padding: 5px;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }
        
        .recipe-steps {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .step-number {
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-utensils me-2"></i>RecipeRecommender
            </a>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">
                © 2024 Recipe Recommender. Discover delicious recipes powered by AI.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js">
    </script>

    <script>
        $(document).ready(function() {
            // Initialize Select2 for ingredient dropdown
            $('#ingredientSelect').select2({
                placeholder: "Select ingredients you have...",
                allowClear: true,
                width: '100%',
                maximumSelectionLength: 10
            });
            
            // Handle ingredient search
            $('#findRecipesBtn').click(function() {
                findRecipesByIngredients();
            });
            
            // Enter key in search
            $('#ingredientSearch').keypress(function(e) {
                if (e.which == 13) {
                    findRecipesByIngredients();
                }
            });
        });
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
